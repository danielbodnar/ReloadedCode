name: Rust

on:
  push:
    branches: [main]
    tags:
      - "*"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { label: "Async Linux", os: ubuntu-latest, target: x86_64-unknown-linux-gnu, mode: async, linux_bwrap: true }
          - { label: "Async Windows", os: windows-latest, target: x86_64-pc-windows-msvc, mode: async, linux_bwrap: false }
          - { label: "Async macOS", os: macos-latest, target: aarch64-apple-darwin, mode: async, linux_bwrap: false }
          - { label: "Blocking Linux", os: ubuntu-latest, target: x86_64-unknown-linux-gnu, mode: blocking, linux_bwrap: true }
          - { label: "Blocking Windows", os: windows-latest, target: x86_64-pc-windows-msvc, mode: blocking, linux_bwrap: false }
          - { label: "Blocking macOS", os: macos-latest, target: aarch64-apple-darwin, mode: blocking, linux_bwrap: false }

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Run tests (Async) and upload coverage
        if: matrix.mode == 'async'
        uses: Reloaded-Project/devops-rust-test-and-coverage@v1
        with:
          rust-project-path: ./src
          upload-coverage: true
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
          codecov-flags: async
          codecov-name: ${{ matrix.label }}
          target: ${{ matrix.target }}
          packages: |
            llm-coding-tools-core
            llm-coding-tools-agents
            llm-coding-tools-serdesai
            llm-coding-tools-models-dev

      - name: Run tests (Blocking) and upload coverage
        if: matrix.mode == 'blocking'
        uses: Reloaded-Project/devops-rust-test-and-coverage@v1
        with:
          rust-project-path: ./src
          upload-coverage: true
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
          codecov-flags: blocking
          codecov-name: ${{ matrix.label }}
          target: ${{ matrix.target }}
          packages: |
            llm-coding-tools-core
            llm-coding-tools-models-dev
          no-default-features: true
          features: "blocking"

      - name: Run Linux-only async feature coverage
        if: matrix.mode == 'async' && matrix.linux_bwrap
        working-directory: src
        shell: bash
        run: |
          cargo test -p llm-coding-tools-bubblewrap
          cargo test -p llm-coding-tools-core --features linux-bubblewrap
          cargo test -p llm-coding-tools-serdesai --features linux-bubblewrap

      - name: Run Linux-only blocking feature coverage
        if: matrix.mode == 'blocking' && matrix.linux_bwrap
        working-directory: src
        shell: bash
        run: |
          cargo test -p llm-coding-tools-bubblewrap --no-default-features --features blocking
          cargo test -p llm-coding-tools-core --no-default-features --features blocking,linux-bubblewrap

      - name: Run cargo-semver-checks
        # Run semver checks only on Linux rows.
        # Linux is the only target with additional exported APIs in this workspace
        # (`linux-bubblewrap` and the bubblewrap crate itself); current Windows/macOS
        # `cfg(...)` usage is implementation-only. Blocking mode still changes public
        # signatures via maybe-async, so the Blocking Linux row checks that surface too.
        if: (github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/')) && matrix.linux_bwrap
        working-directory: src
        shell: bash
        run: |
          cargo +stable binstall --no-confirm cargo-semver-checks --force
          rustup +stable target add ${{ matrix.target }}

          case "${{ matrix.mode }}" in
            async)
              for CRATE in "llm-coding-tools-core" "llm-coding-tools-agents" "llm-coding-tools-serdesai" "llm-coding-tools-models-dev"; do
                SEARCH_RESULT=$(cargo search "^${CRATE}$" --limit 1)
                if echo "$SEARCH_RESULT" | grep -q "^${CRATE} "; then
                  echo "Running semver checks for ${CRATE}..."
                  if [ "${CRATE}" = "llm-coding-tools-core" ]; then
                    cargo +stable semver-checks -p "${CRATE}" --target ${{ matrix.target }} --only-explicit-features --features tokio
                    cargo +stable semver-checks -p "${CRATE}" --target ${{ matrix.target }} --only-explicit-features --features tokio,linux-bubblewrap
                  elif [ "${CRATE}" = "llm-coding-tools-serdesai" ]; then
                    cargo +stable semver-checks -p "${CRATE}" --target ${{ matrix.target }} --only-explicit-features --features full
                    cargo +stable semver-checks -p "${CRATE}" --target ${{ matrix.target }} --only-explicit-features --features full,linux-bubblewrap
                  else
                    cargo +stable semver-checks -p "${CRATE}" --target ${{ matrix.target }}
                  fi
                else
                  echo "No previous version of ${CRATE} found on crates.io. Skipping semver checks."
                fi
              done

              SEARCH_RESULT=$(cargo search "^llm-coding-tools-bubblewrap$" --limit 1)
              if echo "$SEARCH_RESULT" | grep -q "^llm-coding-tools-bubblewrap "; then
                echo "Running semver checks for llm-coding-tools-bubblewrap..."
                cargo +stable semver-checks -p llm-coding-tools-bubblewrap --target ${{ matrix.target }} --only-explicit-features
                cargo +stable semver-checks -p llm-coding-tools-bubblewrap --target ${{ matrix.target }} --only-explicit-features --features tokio
                cargo +stable semver-checks -p llm-coding-tools-bubblewrap --target ${{ matrix.target }} --only-explicit-features --features blocking
              else
                echo "No previous version of llm-coding-tools-bubblewrap found on crates.io. Skipping semver checks."
              fi
              ;;
            blocking)
              for CRATE in "llm-coding-tools-core" "llm-coding-tools-models-dev"; do
                SEARCH_RESULT=$(cargo search "^${CRATE}$" --limit 1)
                if echo "$SEARCH_RESULT" | grep -q "^${CRATE} "; then
                  echo "Running semver checks for ${CRATE}..."
                  if [ "${CRATE}" = "llm-coding-tools-core" ]; then
                    cargo +stable semver-checks -p "${CRATE}" --target ${{ matrix.target }} --only-explicit-features --features blocking
                    cargo +stable semver-checks -p "${CRATE}" --target ${{ matrix.target }} --only-explicit-features --features blocking,linux-bubblewrap
                  else
                    cargo +stable semver-checks -p "${CRATE}" --target ${{ matrix.target }} --only-explicit-features --features blocking
                  fi
                else
                  echo "No previous version of ${CRATE} found on crates.io. Skipping semver checks."
                fi
              done
              ;;
          esac

      - name: Check documentation is valid
        if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/')
        working-directory: src
        shell: bash
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: |
          case "${{ matrix.mode }}:${{ matrix.linux_bwrap }}" in
            async:true)
              cargo doc -p llm-coding-tools-bubblewrap --document-private-items --no-deps --target ${{ matrix.target }}
              cargo doc -p llm-coding-tools-core --features linux-bubblewrap --document-private-items --no-deps --target ${{ matrix.target }}
              cargo doc -p llm-coding-tools-agents --document-private-items --no-deps --target ${{ matrix.target }}
              cargo doc -p llm-coding-tools-serdesai --features linux-bubblewrap --document-private-items --no-deps --target ${{ matrix.target }}
              cargo doc -p llm-coding-tools-models-dev --document-private-items --no-deps --target ${{ matrix.target }}
              ;;
            async:false)
              cargo doc -p llm-coding-tools-core --document-private-items --no-deps --target ${{ matrix.target }}
              cargo doc -p llm-coding-tools-agents --document-private-items --no-deps --target ${{ matrix.target }}
              cargo doc -p llm-coding-tools-serdesai --document-private-items --no-deps --target ${{ matrix.target }}
              cargo doc -p llm-coding-tools-models-dev --document-private-items --no-deps --target ${{ matrix.target }}
              ;;
            blocking:true)
              cargo doc -p llm-coding-tools-bubblewrap --no-default-features --features blocking --document-private-items --no-deps --target ${{ matrix.target }}
              cargo doc -p llm-coding-tools-core --no-default-features --features blocking,linux-bubblewrap --document-private-items --no-deps --target ${{ matrix.target }}
              cargo doc -p llm-coding-tools-models-dev --no-default-features --features blocking --document-private-items --no-deps --target ${{ matrix.target }}
              ;;
            blocking:false)
              cargo doc -p llm-coding-tools-core --no-default-features --features blocking --document-private-items --no-deps --target ${{ matrix.target }}
              cargo doc -p llm-coding-tools-models-dev --no-default-features --features blocking --document-private-items --no-deps --target ${{ matrix.target }}
              ;;
          esac

      - name: Run linter
        if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/')
        working-directory: src
        shell: bash
        run: |
          case "${{ matrix.mode }}:${{ matrix.linux_bwrap }}" in
            async:true)
              cargo clippy -p llm-coding-tools-bubblewrap --target ${{ matrix.target }} -- -D warnings
              cargo clippy -p llm-coding-tools-core --features linux-bubblewrap --target ${{ matrix.target }} -- -D warnings
              cargo clippy -p llm-coding-tools-agents --target ${{ matrix.target }} -- -D warnings
              cargo clippy -p llm-coding-tools-serdesai --features linux-bubblewrap --target ${{ matrix.target }} -- -D warnings
              cargo clippy -p llm-coding-tools-models-dev --target ${{ matrix.target }} -- -D warnings
              ;;
            async:false)
              cargo clippy -p llm-coding-tools-core --target ${{ matrix.target }} -- -D warnings
              cargo clippy -p llm-coding-tools-agents --target ${{ matrix.target }} -- -D warnings
              cargo clippy -p llm-coding-tools-serdesai --target ${{ matrix.target }} -- -D warnings
              cargo clippy -p llm-coding-tools-models-dev --target ${{ matrix.target }} -- -D warnings
              ;;
            blocking:true)
              cargo clippy -p llm-coding-tools-bubblewrap --no-default-features --features blocking --target ${{ matrix.target }} -- -D warnings
              cargo clippy -p llm-coding-tools-core --no-default-features --features blocking,linux-bubblewrap --target ${{ matrix.target }} -- -D warnings
              cargo clippy -p llm-coding-tools-models-dev --no-default-features --features blocking --target ${{ matrix.target }} -- -D warnings
              ;;
            blocking:false)
              cargo clippy -p llm-coding-tools-core --no-default-features --features blocking --target ${{ matrix.target }} -- -D warnings
              cargo clippy -p llm-coding-tools-models-dev --no-default-features --features blocking --target ${{ matrix.target }} -- -D warnings
              ;;
          esac

  format:
    name: Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Run formatter check
        if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/')
        uses: actions-rust-lang/rustfmt@v1
        with:
          manifest-path: src/Cargo.toml

  publish-crate:
    permissions:
      contents: write

    needs: [ci, format]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Publish Rust Crate and Artifacts
        uses: Reloaded-Project/devops-publish-action@v3
        with:
          rust-crates-io-token: ${{ secrets.CRATES_IO_TOKEN }}
          rust-cargo-project-paths: |
            src/llm-coding-tools-bubblewrap
            src/llm-coding-tools-core
            src/llm-coding-tools-agents
            src/llm-coding-tools-serdesai
            src/llm-coding-tools-models-dev
          compression-tool: 7z
          artifact-groups-file: .github/artifact-groups.yml
          changelog-enabled: "true"
          changelog-template: .github/changelog.hbs
          changelog-is-release: ${{ startsWith(github.ref, 'refs/tags/') }}
          changelog-release-tag: ${{ github.ref_name }}
          changelog-override-starting-version: "true"
          changelog-hide-credit: "true"
